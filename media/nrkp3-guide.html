<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NRK P3: Enkel guide til vennskap — Nordic Vagabonds</title>
  <link rel="icon" href="../data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231e2e22' rx='16' width='100' height='100'/><text x='50' y='68' font-family='serif' font-size='52' font-weight='700' fill='%23f5efe4' text-anchor='middle'>NV</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
:root { --forest:#1e2e22; --cream:#f5efe4; --gold:#b8893a; --gold-l:#d4a558; --muted:#6e7d71; --off:#ede6d9; --line:rgba(26,31,27,.12); }
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--cream); color:#1a1f1b; font-family:'DM Sans',sans-serif; font-weight:300; -webkit-font-smoothing:antialiased; }
a { text-decoration:none; color:var(--forest); }
img { max-width:100%; height:auto; display:block; }

.site-header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:1.2rem 3rem; background:rgba(245,239,228,.85);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid transparent; transition:border-color .3s, padding .3s;
}
.site-header.scrolled { border-color:var(--line); padding-block:.8rem; }
.logo { font-family:'Fraunces',serif; font-weight:700; font-size:1.15rem; color:var(--forest); }
.nav-links { list-style:none; display:flex; gap:2rem; }
.nav-links a { font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); transition:color .2s; }
.nav-links a:hover { color:var(--forest); }

.article-page { max-width:900px; margin:0 auto; padding:8rem 3rem 4rem; }
.back { display:inline-block; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:2rem; transition:color .2s; }
.back:hover { color:var(--forest); }

.article-meta { margin-bottom:2rem; }
.article-meta .outlet {
  font-family:'Fraunces',serif; font-size:.85rem; font-style:italic; font-weight:700;
  color:var(--gold); display:block; margin-bottom:.5rem;
}
.article-meta h1 {
  font-family:'Fraunces',serif; font-size:clamp(1.8rem,4vw,2.8rem);
  font-weight:700; color:var(--forest); line-height:1.12; margin-bottom:.8rem;
}
.article-meta .source-link {
  font-size:.82rem; color:var(--gold); border-bottom:1px solid var(--gold);
  padding-bottom:2px; transition:color .2s;
}
.article-meta .source-link:hover { color:var(--gold-l); }
.article-meta .archive-note {
  font-size:.75rem; color:var(--muted); margin-top:.5rem; line-height:1.6;
}

.screenshot-wrap {
  border:1px solid var(--line); border-radius:8px; overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.06);
}
.screenshot-wrap img { width:100%; }

.site-footer {
  background:var(--forest); color:rgba(245,239,228,.25);
  padding:2rem 3rem; display:flex; flex-wrap:wrap; gap:.6rem 2rem; font-size:.72rem;
  margin-top:4rem;
}
.site-footer a { color:rgba(245,239,228,.35); }

@media (max-width:768px) {
  .site-header { padding:1rem 1.5rem; }
  .nav-links { display:none; }
  .article-page { padding:7rem 1.5rem 3rem; }
  .site-footer { padding:2rem 1.5rem; }
}
  </style>
</head>
<body>
<header class="site-header" id="site-header">
  <a href="/" class="logo">Nordic Vagabonds</a>
  <nav><ul class="nav-links">
    <li><a href="/">Hjem</a></li>
    <li><a href="/media.html">Media</a></li>
    <li><a href="/#kontakt">Kontakt</a></li>
  </ul></nav>
</header>

<div class="article-page">
  <a href="/media.html" class="back">&larr; Tilbake til media</a>
  <div class="article-meta">
    <span class="outlet">NRK P3</span>
    <h1>Enkel guide til vennskap</h1>
    <a href="https://p3.no/enkel-guide-til-vennskap/" target="_blank" rel="noopener" class="source-link">Les originalartikkelen hos NRK P3 &rarr;</a>
    <p class="archive-note">Denne siden inneholder et arkivert skjermbilde av artikkelen, bevart i tilfelle originalkilden blir utilgjengelig.</p>
  </div>
  <div class="screenshot-wrap">
    <img src="../img/media/nrkp3-guide.png" alt="Skjermbilde: Enkel guide til vennskap — NRK P3" loading="lazy">
  </div>
</div>

<footer class="site-footer">
  <span>&copy; 2026 Nordic Vagabonds AS</span>
  <span><a href="/">Hjem</a></span>
  <span><a href="/media.html">Media</a></span>
</footer>

<script>
const h = document.getElementById('site-header');
if (h) window.addEventListener('scroll', () => h.classList.toggle('scrolled', window.scrollY > 60), { passive: true });
</script>
</body>
</html>
